<dialog id="custom_generation_overrides_dialog">
    <form class="completion_prompt_manager_popup_entry_form flex-container flexFlowColumn" method="dialog" onsubmit="return false;">
        <div class="completion_prompt_manager_popup_header">
            <label for="custom_generation_overrides_list">
                <span data-i18n="Overrides">Overrides</span>
            </label>
        </div>
        <div class="completion_prompt_manager_popup_entry_form_control">
            <small class="text_muted" data-i18n="Overrides help">Review world info and chat message overrides.</small>
        </div>
        <div id="custom_generation_overrides_list" class="flex-container flexFlowColumn" no-items-text="No overrides" data-i18n="[no-items-text]No overrides"></div>
        <div class="flex-container justifySpaceBetween marginTop5">
            <div></div>
            <div class="flex-container">
                <button id="custom_generation_overrides_close" class="custom_generation_button" type="button" data-i18n="Close">Close</button>
            </div>
        </div>
    </form>
    <style>
        #custom_generation_overrides_dialog {
            padding: 0;
            box-sizing: border-box;
            border: 1.5px solid var(--SmartThemeBorderColor);
            border-radius: 16px;
            background-color: var(--SmartThemeBlurTintColor);
        }

        #custom_generation_overrides_dialog[open] {
            max-height: min(86vh, 760px);
            overflow: hidden;
        }

        #custom_generation_overrides_dialog .completion_prompt_manager_popup_entry_form {
            width: min(920px, 92vw);
            max-width: 92vw;
            max-height: min(calc(86vh - 24px), 720px);
            padding: 5px;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #custom_generation_overrides_dialog .flex-container,
        #custom_generation_overrides_dialog .completion_prompt_manager_popup_entry_form_control,
        #custom_generation_overrides_dialog .flex-container > *,
        #custom_generation_overrides_dialog small,
        #custom_generation_overrides_dialog button {
            min-width: 0;
            max-width: 100%;
            box-sizing: border-box;
        }

        #custom_generation_overrides_dialog .justifySpaceBetween {
            width: 100%;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        #custom_generation_overrides_dialog .justifySpaceBetween > :first-child {
            display: none;
        }

        #custom_generation_overrides_dialog .justifySpaceBetween > .flex-container:last-child {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: flex-end;
        }

        #custom_generation_overrides_close {
            margin: 0;
            min-width: 0;
            max-width: 100%;
        }

        #custom_generation_overrides_list {
            width: 100%;
            max-width: 100%;
            align-items: stretch;
            gap: 10px;
            max-height: min(calc(86vh - 180px), 560px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            box-sizing: border-box;
        }

        #custom_generation_overrides_list > * {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .custom_generation_overrides_section {
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 6px;
            background-color: var(--SmartThemeBlurTintColor);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .custom_generation_overrides_section_title {
            padding: 6px 8px;
            font-weight: 600;
            border-bottom: 1px solid var(--SmartThemeBorderColor);
            background-color: var(--white20a);
        }

        .custom_generation_overrides_section_body {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 6px;
            min-width: 0;
        }

        .custom_generation_overrides_entry {
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 6px;
            background-color: var(--SmartThemeBlurTintColor);
            overflow: hidden;
        }

        .custom_generation_overrides_summary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            cursor: pointer;
            min-width: 0;
        }

        .custom_generation_overrides_summary::-webkit-details-marker {
            display: none;
        }

        .custom_generation_overrides_entry[open] .custom_generation_overrides_summary {
            background-color: var(--white30a);
        }

        .custom_generation_overrides_caret {
            transition: transform var(--animation-duration-2x);
            opacity: 0.7;
            flex-shrink: 0;
        }

        .custom_generation_overrides_entry[open] .custom_generation_overrides_caret {
            transform: rotate(90deg);
        }

        .custom_generation_overrides_summary_left {
            min-width: 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .custom_generation_overrides_title,
        .custom_generation_overrides_meta {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .custom_generation_overrides_title {
            font-weight: 600;
        }

        .custom_generation_overrides_meta {
            opacity: 0.85;
            font-size: 0.9em;
        }

        .custom_generation_overrides_summary_right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            min-width: 0;
        }

        .custom_generation_overrides_badge {
            font-size: 0.8em;
            padding: 1px 6px;
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 999px;
            opacity: 0.9;
            max-width: 100%;
        }

        .custom_generation_overrides_body {
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .custom_generation_overrides_info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            font-size: 0.9em;
            min-width: 0;
        }

        .custom_generation_overrides_info_item {
            display: flex;
            gap: 6px;
            min-width: 0;
        }

        .custom_generation_overrides_info_label {
            opacity: 0.75;
            flex-shrink: 0;
        }

        .custom_generation_overrides_block_header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }

        .custom_generation_overrides_block_title {
            font-weight: 600;
            margin-bottom: 0;
        }

        .custom_generation_copy_button,
        .custom_generation_edit_button,
        .custom_generation_save_button,
        .custom_generation_cancel_button {
            flex: 0 0 auto;
            cursor: pointer;
            margin-top: 0px;
            margin-bottom: 0px;
            margin-left: 2px;
            margin-right: 2px;
        }

        .custom_generation_copy_button:hover {
            opacity: 0.85;
        }

        .custom_generation_overrides_buttons {
            display: flex;
            flex-direction: row;
        }

        .custom_generation_overrides_pre {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            background-color: var(--SmartThemeBlurTintColor);
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 5px;
            padding: 6px 8px;
            max-height: min(32vh, 320px);
            overflow: auto;
            font-family: var(--mono-font, monospace);
            font-size: 0.85em;
            max-width: 100%;
            box-sizing: border-box;
        }

        .custom_generation_edit_button,
        .custom_generation_save_button,
        .custom_generation_cancel_button {
            flex: 0 0 auto;
            cursor: pointer;
        }

        .custom_generation_edit_button:hover,
        .custom_generation_save_button:hover,
        .custom_generation_cancel_button:hover {
            opacity: 0.85;
        }

        .custom_generation_overrides_textarea {
            width: 100%;
            min-height: 320px;
            max-height: min(32vh, 320px);
            background-color: var(--SmartThemeBlurTintColor);
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 5px;
            padding: 6px 8px;
            font-family: var(--mono-font, monospace);
            font-size: 0.85em;
            resize: vertical;
            box-sizing: border-box;
            color: inherit;
        }
    </style>
</dialog>
