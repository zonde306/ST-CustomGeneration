<dialog id="custom_generation_logger_dialog">
    <form class="completion_prompt_manager_popup_entry_form flex-container flexFlowColumn" method="dialog" onsubmit="return false;">
        <div class="completion_prompt_manager_popup_header">
            <label for="custom_generation_logger_list">
                <span data-i18n="Generate Log">Generate Log</span>
            </label>
        </div>
        <div class="completion_prompt_manager_popup_entry_form_control">
            <small class="text_muted" data-i18n="Generate log help">Review generate requests, options, and responses.</small>
        </div>
        <div id="custom_generation_logger_list" class="flex-container flexFlowColumn" no-items-text="No logs" data-i18n="[no-items-text]No logs"></div>
        <div class="flex-container justifySpaceBetween marginTop5">
            <div></div>
            <div class="flex-container">
                <button id="custom_generation_logger_close" class="custom_generation_button" type="button" data-i18n="Close">Close</button>
            </div>
        </div>
    </form>
<style>
        #custom_generation_logger_dialog {
            padding: 0;
            box-sizing: border-box;
        }

        #custom_generation_logger_dialog[open] {
            max-height: min(86vh, 760px);
            overflow: hidden;
        }

        #custom_generation_logger_dialog .completion_prompt_manager_popup_entry_form {
            width: min(920px, 92vw);
            max-width: 92vw;
            box-sizing: border-box;
            max-height: min(calc(86vh - 24px), 720px);
            overflow-y: auto;
            overflow-x: hidden;
            margin: 5px;
        }

        #custom_generation_logger_dialog .flex-container,
        #custom_generation_logger_dialog .completion_prompt_manager_popup_entry_form_control,
        #custom_generation_logger_dialog .flex-container > *,
        #custom_generation_logger_dialog small,
        #custom_generation_logger_dialog button {
            min-width: 0;
            max-width: 100%;
            box-sizing: border-box;
        }

        #custom_generation_logger_dialog .justifySpaceBetween {
            width: 100%;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        #custom_generation_logger_dialog .justifySpaceBetween > :first-child {
            display: none;
        }

        #custom_generation_logger_dialog .justifySpaceBetween > .flex-container:last-child {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: flex-end;
        }

        #custom_generation_logger_close {
            margin: 0;
            min-width: 0;
            max-width: 100%;
        }

        #custom_generation_logger_list {
            width: 100%;
            max-width: 100%;
            align-items: stretch;
            gap: 6px;
            max-height: min(calc(86vh - 180px), 560px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            box-sizing: border-box;
        }

        #custom_generation_logger_list > * {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .custom_generation_logger_entry {
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 6px;
            background-color: var(--SmartThemeBlurTintColor);
            overflow: hidden;
            flex: 0 0 auto;
        }

        .custom_generation_logger_entry.ui-accordion {
            padding: 0;
        }

        .custom_generation_logger_summary,
        .custom_generation_logger_block_header {
            gap: 8px;
            padding: 4px 6px;
            cursor: pointer;
            user-select: none;
        }

        .custom_generation_logger_summary {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            grid-template-areas:
                'caret title right'
                'caret meta right';
            align-items: start;
        }

        .custom_generation_logger_block_header {
            display: flex;
            align-items: center;
        }

        .custom_generation_logger_summary::-webkit-details-marker {
            display: none;
        }

        .custom_generation_logger_summary.ui-accordion-header-active {
            background-color: var(--SmartThemeChatTintColor);
            color: var(--SmartThemeQuoteColor);
        }

        .custom_generation_logger_caret,
        .custom_generation_logger_block_caret {
            transition: transform var(--animation-duration-2x);
            opacity: 0.7;
        }

        .custom_generation_logger_caret {
            grid-area: caret;
            align-self: start;
            margin-top: 2px;
            margin-right: 1em;
        }

        .custom_generation_logger_summary.ui-accordion-header-active .custom_generation_logger_caret,
        .custom_generation_logger_block_header.ui-accordion-header-active .custom_generation_logger_block_caret {
            transform: rotate(90deg);
        }

        .custom_generation_logger_summary_left {
            min-width: 0;
            display: contents;
            flex: 1;
        }

        .custom_generation_logger_title,
        .custom_generation_logger_meta {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .custom_generation_logger_title {
            grid-area: title;
            font-weight: 600;
        }

        .custom_generation_logger_meta {
            grid-area: meta;
            opacity: 0.85;
            font-size: 0.9em;
        }

        .custom_generation_logger_summary_right {
            grid-area: right;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            align-self: start;
            justify-self: end;
            margin-top: 1px;
        }

        .custom_generation_logger_badge {
            font-size: 0.8em;
            padding: 1px 6px;
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 999px;
            opacity: 0.9;
        }

        .custom_generation_logger_status {
            font-weight: 600;
        }

        .custom_generation_logger_body {
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .custom_generation_logger_body.ui-accordion-content {
            border: none;
            max-height: min(54vh, 460px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            box-sizing: border-box;
        }

        .custom_generation_logger_info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
        }

        .custom_generation_logger_info_item {
            display: flex;
            gap: 6px;
            font-size: 0.9em;
        }

        .custom_generation_logger_info_label {
            opacity: 0.75;
        }

        .custom_generation_logger_section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .custom_generation_logger_section_title {
            font-weight: 600;
        }

        .custom_generation_logger_section_body {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .custom_generation_logger_block_header {
            background-color: var(--white10a);
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 5px;
        }

        .custom_generation_logger_block_header.ui-accordion-header-active {
            background-color: var(--SmartThemeChatTintColor);
            color: var(--SmartThemeQuoteColor);
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .custom_generation_logger_block_panel {
            border: 1px solid var(--SmartThemeBorderColor);
            border-top: none;
            border-radius: 0 0 5px 5px;
            padding: 6px 8px;
            background-color: var(--SmartThemeBlurTintColor);
            min-width: 0;
            overflow: hidden;
        }

        .custom_generation_logger_block_header_row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }

        .custom_generation_copy_button {
            flex: 0 0 auto;
            cursor: pointer;
        }

        .custom_generation_copy_button:hover {
            opacity: 0.85;
        }

        .custom_generation_logger_pre {
            display: block;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            white-space: pre-wrap;
            background-color: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            max-height: min(36vh, 320px);
            overflow: auto;
            font-family: var(--mono-font, monospace);
            font-size: 0.85em;
        }

        .custom_generation_logger_error {
            border-top: 1px dashed var(--SmartThemeBorderColor);
            padding-top: 6px;
        }
    </style>
</dialog>
