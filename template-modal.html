<dialog id="custom_generation_template_dialog">
    <form class="completion_prompt_manager_popup_entry_form flex-container flexFlowColumn" method="dialog" onsubmit="return false;">
        <div class="completion_prompt_manager_popup_header">
            <label for="custom_generation_template_prompt_list">
                <span data-i18n="Template Editor">Template Editor</span>
            </label>
        </div>
        <div class="custom_generation_modal_body">
            <div class="flex-container">
                <div class="completion_prompt_manager_popup_entry_form_control flex1">
                    <label for="custom_generation_template_decorator">
                        <span data-i18n="Decorator">Decorator</span>
                    </label>
                    <select id="custom_generation_template_decorator" class="text_pole"></select>
                </div>
                <div class="completion_prompt_manager_popup_entry_form_control flex1">
                    <label for="custom_generation_template_tag">
                        <span data-i18n="Tag">Tag</span>
                    </label>
                    <input id="custom_generation_template_tag" class="text_pole" type="text" />
                </div>
            </div>
            <small class="text_muted" data-i18n="cg_template_decorator_help">
                In WI, this is utilized in the form of an `@@decorator` tag; if no matching tag is found, it falls back to an empty tag.
            </small>
            <div class="flex-container">
                <div class="completion_prompt_manager_popup_entry_form_control flex1">
                    <label for="custom_generation_template_retry_count">
                        <span data-i18n="Retry Count">Retry Count</span>
                    </label>
                    <input id="custom_generation_template_retry_count" class="text_pole" type="number" min="0" step="1" />
                </div>
                <div class="completion_prompt_manager_popup_entry_form_control flex1">
                    <label for="custom_generation_template_retry_interval">
                        <span data-i18n="Retry Interval (ms)">Retry Interval (ms)</span>
                    </label>
                    <input id="custom_generation_template_retry_interval" class="text_pole" type="number" min="0" step="1" />
                </div>
            </div>
            <div class="completion_prompt_manager_popup_entry_form_control">
                <label for="custom_generation_template_filters">
                    <span data-i18n="Filters (comma separated)">Filters (comma separated)</span>
                </label>
                <select id="custom_generation_template_filters" class="text_pole" multiple="multiple" data-placeholder="main, charDescription"></select>
            </div>
            <div class="completion_prompt_manager_popup_entry_form_control">
                <label for="custom_generation_template_regex">
                    <span data-i18n="Regex">Regex</span>
                </label>
                <input id="custom_generation_template_regex" class="text_pole textarea_compact" rows="3" />
                <small class="text_muted p_compact" data-i18n="cg_template_regex_help">
                    If the AI ​​outputs an expression that does not match, it will retry.
                </small>
            </div>
            <div class="completion_prompt_manager_popup_entry_form_control">
                <label for="custom_generation_template_find_regex">
                    <span data-i18n="Find Regex">Find Regex</span>
                </label>
                <input id="custom_generation_template_find_regex" class="text_pole textarea_compact" rows="3" />
                <small class="text_muted p_compact" data-i18n="cg_template_find_regex_help">
                    If the chat message does not match the expression, it will not trigger.
                </small>
            </div>
            <div class="flex-container alignItemsBaseline">
                <h3 class="margin0 flex1">
                    <span data-i18n="Prompts">Prompts</span>
                </h3>
                <div id="custom_generation_template_add_prompt" class="custom_generation_button custom_generation_button_icon" title="Add prompt" data-i18n="[title]New prompt">
                    <i class="fa-solid fa-plus"></i>
                    <small data-i18n="Add">Add</small>
                </div>
            </div>
            <div id="custom_generation_template_prompt_list" class="flex-container flexFlowColumn" no-items-text="No prompts" data-i18n="[no-items-text]No prompts"></div>
        </div>
        <div class="custom_generation_modal_footer flex-container justifySpaceBetween marginTop5">
            <a id="custom_generation_template_delete" class="custom_generation_button fa-solid fa-trash" title="Delete template" data-i18n="[title]Delete template"></a>
            <div class="flex-container">
                <button id="custom_generation_template_cancel" class="custom_generation_button" type="button" data-i18n="Cancel">Cancel</button>
                <button id="custom_generation_template_save_as" class="custom_generation_button" type="button" style="display: none;" data-i18n="Save As">Save As</button>
                <button id="custom_generation_template_save" class="custom_generation_button" type="button" data-i18n="Save">Save</button>
            </div>
        </div>
    </form>

    <style>
        #custom_generation_template_dialog {
            padding: 0;
            box-sizing: border-box;
        }

        #custom_generation_template_dialog[open] {
            max-height: min(86vh, 760px);
            overflow: hidden;
        }

        #custom_generation_template_dialog .completion_prompt_manager_popup_entry_form {
            width: min(920px, 92vw);
            max-width: 92vw;
            max-height: min(calc(86vh - 24px), 720px);
            margin: 5px;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #custom_generation_template_dialog .custom_generation_modal_body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }

        #custom_generation_template_dialog .custom_generation_modal_footer {
            flex-shrink: 0;
            padding-top: 8px;
            border-top: 1px solid var(--SmartThemeBorderColor);
            margin-top: 8px;
        }

        #custom_generation_template_dialog .flex-container,
        #custom_generation_template_dialog .completion_prompt_manager_popup_entry_form_control,
        #custom_generation_template_dialog .flex-container > .flex1,
        #custom_generation_template_dialog .select2-container,
        #custom_generation_template_dialog input,
        #custom_generation_template_dialog select,
        #custom_generation_template_dialog textarea,
        #custom_generation_template_dialog small,
        #custom_generation_template_dialog h3 {
            min-width: 0;
            max-width: 100%;
            box-sizing: border-box;
        }

        #custom_generation_template_prompt_list {
            width: 100%;
            max-width: 100%;
            align-items: stretch;
            gap: 6px;
            max-height: min(calc(86vh - 180px), 560px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            box-sizing: border-box;
        }

        #custom_generation_template_prompt_list > * {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #custom_generation_template_dialog #custom_generation_template_prompt_list .custom_generation_list_row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 34px;
            padding: 4px 6px;
            border: 1px solid var(--SmartThemeBorderColor);
            border-radius: 6px;
            background-color: var(--SmartThemeBlurTintColor);
            color: var(--SmartThemeBodyColor);
            visibility: visible;
            opacity: 1;
        }

        #custom_generation_template_dialog #custom_generation_template_prompt_list .custom_generation_list_row > .flex-container,
        #custom_generation_template_dialog #custom_generation_template_prompt_list .custom_generation_list_row .flex1 {
            min-width: 0;
        }

        #custom_generation_template_dialog #custom_generation_template_prompt_list .custom_generation_list_row .menu_button,
        #custom_generation_template_dialog #custom_generation_template_prompt_list .custom_generation_list_row input,
        #custom_generation_template_dialog #custom_generation_template_prompt_list .custom_generation_list_row div {
            color: inherit;
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            #custom_generation_template_prompt_list {
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }
        }

        .p_compact {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .p_compact > p {
            margin: 0px;
            padding: 0px;
        }
    </style>
</dialog>
